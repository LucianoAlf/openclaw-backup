<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><title>LA Respiração Rock 03</title><style>
@import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;900&display=swap');
:root{--pink:#E91451;--pink-dark:#B01545;--pink-deep:#740A28;--dark-la:#373435;--black:#0A0A0A;--black-soft:#141414;--light:#E8E8E8;--gray:#9E9E9E;--white:#fff;--font:'Prompt',sans-serif;}
*{box-sizing:border-box}body{margin:0;width:1080px;height:1350px;overflow:hidden;background:#000;font-family:var(--font)}
.slide{position:relative;width:1080px;height:1350px;overflow:hidden;padding:70px 68px 118px;color:#fff;display:flex;flex-direction:column;justify-content:center}.cover,.photo{background:#000}.dark{background:radial-gradient(circle at 75% 20%,#300815 0,#0A0A0A 48%,#000 100%)}.pink,.cta{background:linear-gradient(135deg,var(--pink) 0%,var(--pink-dark) 55%,var(--pink-deep) 100%)}.light{background:var(--light);color:var(--dark-la)}
.bg{position:absolute;inset:0;background-size:cover;background-position:center;transform:scale(1.03);filter:contrast(1.12) saturate(.95)}.bg:after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.08),rgba(0,0,0,.24) 32%,rgba(0,0,0,.88) 78%,#000),linear-gradient(90deg,rgba(0,0,0,.78),rgba(0,0,0,.10) 55%,rgba(233,20,81,.42))}.photo .bg:after{background:linear-gradient(180deg,rgba(0,0,0,.16),rgba(0,0,0,.46) 45%,rgba(0,0,0,.93)),linear-gradient(90deg,rgba(0,0,0,.72),rgba(176,21,69,.22))}
.logo{position:absolute;z-index:20;top:45px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:12px;color:#fff;font-weight:900;text-transform:uppercase;text-shadow:0 4px 14px rgba(0,0,0,.38)}.light .logo{color:var(--dark-la);text-shadow:none}.mark{border:3px solid currentColor;border-radius:14px;padding:3px 8px;font-size:24px;line-height:1}.brand{font-size:16px;line-height:.95;letter-spacing:.5px}.num{position:absolute;z-index:20;right:58px;top:58px;font-size:21px;font-weight:900;color:rgba(255,255,255,.72)}.light .num{color:rgba(55,52,53,.55)}
.halftone{position:absolute;z-index:1;inset:0;opacity:.36;background-image:radial-gradient(circle,rgba(255,255,255,.38) 1.7px,transparent 2px);background-size:11px 11px;mask-image:radial-gradient(circle at 18% 18%,black 0,transparent 36%),radial-gradient(circle at 90% 82%,black 0,transparent 43%)}.light .halftone{opacity:.5;background-image:radial-gradient(circle,rgba(233,20,81,.32) 1.8px,transparent 2px)}.water{position:absolute;z-index:1;right:-105px;top:140px;font-size:540px;line-height:.78;font-weight:900;letter-spacing:-48px;color:transparent;-webkit-text-stroke:5px rgba(255,255,255,.10)}.pink .water,.cta .water{-webkit-text-stroke-color:rgba(116,10,40,.56)}.light .water{-webkit-text-stroke-color:rgba(233,20,81,.16)}.x{position:absolute;z-index:2;left:70px;top:210px;font-size:58px;font-weight:900;color:var(--pink)}.pink .x,.cover .x,.photo .x,.cta .x{color:#fff;opacity:.72}.chev{position:absolute;z-index:2;right:72px;bottom:198px;font-size:76px;font-weight:900;color:var(--pink)}.pink .chev,.cta .chev{color:#fff;opacity:.9}
.content{position:relative;z-index:5;margin-top:58px}.kicker{font-size:24px;font-weight:900;letter-spacing:3px;color:var(--pink);text-transform:uppercase;margin-bottom:12px}.tag{display:inline-flex;background:var(--pink);color:#fff;border-radius:999px;padding:12px 22px;margin-bottom:26px;font-size:18px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;box-shadow:8px 8px 0 rgba(0,0,0,.58)}.light .tag{box-shadow:7px 7px 0 var(--dark-la)}.pink .tag,.cta .tag{background:#fff;color:var(--pink-deep);box-shadow:8px 8px 0 rgba(0,0,0,.26)}
h1{margin:0;text-transform:uppercase;font-size:114px;line-height:.84;letter-spacing:-4px;font-weight:900;max-width:940px}.cover h1{font-size:122px}.solid{display:block;color:#fff}.light .solid{color:var(--dark-la)}.outline{display:block;color:transparent;-webkit-text-stroke:4px #fff}.light .outline{-webkit-text-stroke-color:var(--pink)}.copy{margin:34px 0 0;max-width:780px;font-size:33px;line-height:1.18;font-weight:600;color:rgba(255,255,255,.9)}.light .copy{color:#222}.note{display:inline-flex;margin-top:34px;background:var(--black);color:#fff;border-radius:20px;padding:19px 25px;font-size:24px;font-weight:900;text-transform:uppercase;letter-spacing:.8px;box-shadow:8px 8px 0 rgba(233,20,81,.62)}.pink .note{box-shadow:8px 8px 0 rgba(255,255,255,.2)}.cover .note{background:var(--pink);box-shadow:8px 8px 0 rgba(0,0,0,.72)}.button{display:inline-flex;margin-top:44px;background:#fff;color:var(--pink-deep);border-radius:999px;padding:22px 32px;font-size:25px;font-weight:900;text-transform:uppercase;box-shadow:10px 10px 0 rgba(0,0,0,.25)}

</style></head><body><section class="slide pink"><div class="halftone"></div><div class="water">LA</div><div class="x">+</div><div class="chev">»»</div><div class="logo"><div class="mark">LA</div><div class="brand">Music<br>School</div></div><div class="num">03/08</div><main class="content"><div class="tag">BASE</div><h1><span class="solid">BAIXO</span><span class="outline">E LARGO</span></h1><p class="copy">Inspire sentindo costelas e cintura abrirem. Ombro subindo é sinal de tensão — não de potência.</p><div class='note'>PALCO COMEÇA NO CORPO.</div></main><div class="footer"><div class="pill">◎ @lamusicschool</div><div class="stripes"></div></div></section></body></html>
