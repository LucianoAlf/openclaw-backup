%,transparent 58%)}.halftone.all{background-image:radial-gradient(circle,var(--deep) 2px,transparent 3.3px);opacity:.62;mix-blend-mode:normal;mask-image:radial-gradient(ellipse at center,transparent 20%,black 98%);-webkit-mask-image:radial-gradient(ellipse at center,transparent 20%,black 98%)}.light .halftone{background-image:radial-gradient(circle,var(--pink) 1.9px,transparent 3px);opacity:.21;mix-blend-mode:normal}.logo{position:absolute;top:54px;left:0;right:0;display:flex;justify-content:center;z-index:20;filter:drop-shadow(0 7px 15px rgba(0,0,0,.9))}.logo img{height:78px;max-width:360px}.logo.corner{left:auto;right:58px;justify-content:flex-end}.logo.corner img{height:64px}.la{position:absolute;z-index:5;opacity:.16;pointer-events:none}.la img{width:100%;height:100%;object-fit:contain}.la.left{left:-220px;bottom:125px;width:560px;height:560px;transform:rotate(-13deg)}.la.right{right:-240px;bottom:120px;width:600px;height:600px;transform:rotate(10deg)}.la.center{left:50%;top:50%;width:900px;height:900px;transform:translate(-50%,-50%) rotate(-8deg);opacity:.08}.content{position:absolute;z-index:10;left:64px;right:64px}.right{text-align:right;left:auto;right:58px;width:610px}.leftText{right:auto;left:64px;width:620px}.mid{top:200px}.center{top:225px;bottom:170px;display:flex;flex-direction:column;justify-content:center}.lower{bottom:190px}.kicker{display:inline-flex;align-items:center;gap:14px;font-size:23px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:#fff;margin-bottom:22px;text-shadow:0 4px 14px rgba(0,0,0,.95)}.kicker:before{content:'';display:block;width:54px;height:6px;background:var(--pink);transform:skewX(-25deg)}.right .kicker:before{display:none}.right .kicker:after{content:'';display:block;width:54px;height:6px;background:var(--pink);transform:skewX(-25deg)}.light .kicker{color:var(--pink);text-shadow:none}.pink .kicker{color:#fff}h1,h2{margin:0;font-weight:900;text-transform:uppercase;letter-spacing:-6px;text-shadow:0 8px 24px rgba(0,0,0,.92)}h1{font-size:118px;line-height:.79}h2{font-size:100px;line-height:.83}.huge{font-size:146px;line-height:.76}.small{font-size:78px;line-height:.86}.pinkword{color:var(--pink)}.outline{color:transparent;-webkit-text-stroke:4px #fff;text-stroke:4px #fff;text-shadow:0 5px 18px rgba(0,0,0,1)}.light .outline{color:transparent;-webkit-text-stroke:4px #0A0A0A;text-shadow:none}.body{margin-top:24px;font-size:41px;line-height:1.09;font-weight:700;text-shadow:0 6px 18px rgba(0,0,0,1),0 0 3px rgba(0,0,0,1)}.light .body{color:#111;text-shadow:none}.body em{font-style:normal;color:var(--pink)}.name{display:inline-block;margin-top:24px;background:var(--pink);color:#fff;border-radius:999px;padding:12px 24px;font-size:25px;font-weight:900;text-transform:uppercase;letter-spacing:1.5px;box-shadow:6px 7px 0 rgba(0,0,0,.78)}.num{position:absolute;z-index:6;font-size:245px;font-weight:900;line-height:.8;color:transparent;-webkit-text-stroke:4px var(--pink);opacity:.68;letter-spacing:-16px}.n1{right:56px;top:175px}.n2{left:52px;bottom:250px}.footer{position:absolute;bottom:48px;left:0;right:0;display:flex;flex-direction:column;align-items:center;z-index:25}.pill{display:inline-flex;align-items:center;gap:13px;background:var(--pink);color:#fff;padding:16px 34px;border-radius:999px;font-weight:900;font-size:22px;text-transform:uppercase;letter-spacing:1.4px;box-shadow:6px 7px 0 rgba(0,0,0,.75)}.ig{width:25px;height:25px;border:2px solid #fff;border-radius:6px;position:relative}.ig:after{content:'';position:absolute;top:50%;left:50%;width:8px;height:8px;border:2px solid #fff;border-radius:50%;transform:translate(-50%,-50%)}.stripes{display:flex;gap:8px;margin-top:12px}.stripes i{display:block;width:36px;height:7px;background:#fff;transform:skewX(-25deg)}.light .stripes i{background:#111}.cta{margin-top:30px;display:inline-block;background:#111;color:#fff;padding:20px 36px;border-radius:999px;font-weight:900;font-size:36px;text-transform:uppercase;box-shadow:8px 9px 0 rgba(233,20,
