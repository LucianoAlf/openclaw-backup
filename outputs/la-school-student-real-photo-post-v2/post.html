<!doctype html><html><head><meta charset="utf-8"><style>
@font-face{font-family:Prompt;src:url('assets/font-black.ttf') format('truetype');font-weight:900}
@font-face{font-family:Prompt;src:url('assets/font-bold.ttf') format('truetype');font-weight:700}
@font-face{font-family:Prompt;src:url('assets/font-regular.ttf') format('truetype');font-weight:400}
:root{--pink:#E91451;--deep:#740A28;--black:#0A0A0A;--white:#fff}
*{box-sizing:border-box}body{margin:0;background:#111;font-family:Prompt,Arial,sans-serif}.post{width:1080px;height:1350px;position:relative;overflow:hidden;background:#0A0A0A;color:#fff}.photo{position:absolute;inset:0;z-index:1}.photo img{width:100%;height:100%;object-fit:cover;object-position:43% center;filter:contrast(1.12) saturate(1.10)}.shade{position:absolute;inset:0;z-index:2;background:linear-gradient(90deg,rgba(0,0,0,.04) 0%,rgba(0,0,0,.20) 36%,rgba(0,0,0,.80) 100%),linear-gradient(180deg,rgba(0,0,0,.55) 0%,rgba(0,0,0,.05) 28%,rgba(0,0,0,.88) 100%)}.pinkGlow{position:absolute;inset:0;z-index:3;background:radial-gradient(ellipse at 80% 28%,rgba(233,20,81,.45),transparent 36%),radial-gradient(ellipse at 16% 74%,rgba(233,20,81,.20),transparent 30%);mix-blend-mode:screen;opacity:.62}.subjectLight{position:absolute;inset:0;z-index:3;background:radial-gradient(ellipse at 32% 42%,rgba(255,220,230,.13),transparent 26%);mix-blend-mode:screen;pointer-events:none}.halftone{position:absolute;inset:0;z-index:4;pointer-events:none;background-image:radial-gradient(circle,var(--pink) 2.1px,transparent 3.25px);background-size:18px 18px;opacity:.28;mix-blend-mode:screen;mask-image:linear-gradient(to left,black 0%,black 24%,transparent 58%);-webkit-mask-image:linear-gradient(to left,black 0%,black 24%,transparent 58%)}.halftone2{position:absolute;inset:0;z-index:4;pointer-events:none;background-image:radial-gradient(circle,var(--deep) 1.8px,transparent 3px);background-size:17px 17px;opacity:.16;mask-image:radial-gradient(ellipse at bottom left,black 0%,transparent 43%);-webkit-mask-image:radial-gradient(ellipse at bottom left,black 0%,transparent 43%)}.logo{position:absolute;top:56px;right:62px;z-index:20;filter:drop-shadow(0 7px 15px rgba(0,0,0,.85))}.logo img{height:64px;max-width:300px}.laSolo{position:absolute;left:-135px;bottom:118px;width:500px;height:500px;z-index:6;opacity:.22;filter:drop-shadow(0 10px 24px rgba(0,0,0,.25));pointer-events:none;transform:rotate(-10deg)}.laSolo img{width:100%;height:100%;object-fit:contain}.copy{position:absolute;right:54px;top:170px;width:600px;z-index:10;text-align:right}.kicker{display:inline-flex;align-items:center;gap:14px;font-size:20px;font-weight:900;letter-spacing:3.2px;text-transform:uppercase;color:#fff;margin-bottom:24px;text-shadow:0 4px 14px rgba(0,0,0,.9)}.kicker:after{content:'';width:54px;height:6px;background:var(--pink);display:block;transform:skewX(-25deg)}h1{margin:0;font-weight:900;text-transform:uppercase;font-size:118px;line-height:.80;letter-spacing:-7px;text-shadow:0 8px 24px rgba(0,0,0,.90)}.pink{color:var(--pink)}.outline{color:transparent;-webkit-text-stroke:4.3px #fff;text-stroke:3.9px #fff;text-shadow:0 5px 18px rgba(0,0,0,.95)}.sub{margin-top:22px;margin-left:auto;max-width:460px;font-size:32px;line-height:1.12;font-weight:700;color:#fff;text-shadow:0 6px 18px rgba(0,0,0,1),0 0 3px rgba(0,0,0,1)}.sub em{font-style:normal;color:var(--pink)}.footer{position:absolute;bottom:42px;left:0;right:0;display:flex;flex-direction:column;align-items:center;z-index:25}.pill{display:inline-flex;align-items:center;gap:13px;background:var(--pink);color:#fff;padding:14px 31px;border-radius:999px;font-weight:900;font-size:19px;text-transform:uppercase;letter-spacing:1.4px;box-shadow:6px 7px 0 rgba(0,0,0,.75)}.ig{width:23px;height:23px;border:2px solid #fff;border-radius:6px;position:relative}.ig:after{content:'';position:absolute;top:50%;left:50%;width:8px;height:8px;border:2px solid #fff;border-radius:50%;transform:translate(-50%,-50%)}.stripes{display:flex;gap:8px;margin-top:12px}.stripes i{display:block;width:36px;height:7px;background:#fff;transform:skewX(-25deg)}
</style></head><body><section class="post"><div class="photo"><img src="assets/photo.jpg"></div><div class="shade"></div><div class="pinkGlow"></div><div class="subjectLight"></div><div class="halftone"></div><div class="halftone2"></div><div class="logo"><img src="assets/logo.svg"></div><div class="copy"><div class="kicker">aluno no palco</div><h1>O PALCO<br><span class="outline">COMEÇA</span><br><span class="pink">AQUI</span></h1><div class="sub">Cada aluno tem <em>um som</em><br>pra mostrar.</div></div><div class="footer"><div class="pill"><span class="ig"></span>@lamusicschool</div><div class="stripes"><i></i><i></i><i></i><i></i></div></div></section></body></html>
