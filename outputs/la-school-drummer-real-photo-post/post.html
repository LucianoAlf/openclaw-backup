<!doctype html><html><head><meta charset="utf-8"><style>
@font-face{font-family:Prompt;src:url('assets/font-black.ttf') format('truetype');font-weight:900}
@font-face{font-family:Prompt;src:url('assets/font-bold.ttf') format('truetype');font-weight:700}
@font-face{font-family:Prompt;src:url('assets/font-regular.ttf') format('truetype');font-weight:400}
:root{--pink:#E91451;--shade:#B01545;--deep:#740A28;--black:#0A0A0A;--white:#fff}
*{box-sizing:border-box}body{margin:0;background:#111;font-family:Prompt,Arial,sans-serif}.post{width:1080px;height:1350px;position:relative;overflow:hidden;background:#0A0A0A;color:#fff}.photo{position:absolute;inset:0;z-index:1}.photo img{width:100%;height:100%;object-fit:cover;object-position:42% center;filter:contrast(1.09) saturate(1.14) brightness(1.08)}.shade{position:absolute;inset:0;z-index:2;background:linear-gradient(90deg,rgba(0,0,0,.18) 0%,rgba(0,0,0,.20) 34%,rgba(0,0,0,.78) 100%),linear-gradient(180deg,rgba(0,0,0,.58) 0%,rgba(0,0,0,.10) 32%,rgba(0,0,0,.91) 100%)}.stageGlow{position:absolute;inset:0;z-index:3;background:radial-gradient(ellipse at 82% 24%,rgba(233,20,81,.58),transparent 34%),radial-gradient(ellipse at 23% 72%,rgba(233,20,81,.18),transparent 33%);mix-blend-mode:screen;opacity:.62}.subjectLight{position:absolute;inset:0;z-index:3;background:radial-gradient(ellipse at 37% 42%,rgba(255,230,230,.24),transparent 28%);mix-blend-mode:screen;pointer-events:none}.halftone{position:absolute;inset:0;z-index:4;pointer-events:none;background-image:radial-gradient(circle,var(--pink) 2.1px,transparent 3.25px);background-size:18px 18px;opacity:.32;mix-blend-mode:screen;mask-image:radial-gradient(ellipse at top right,black 0%,black 20%,transparent 55%);-webkit-mask-image:radial-gradient(ellipse at top right,black 0%,black 20%,transparent 55%)}.halftone2{position:absolute;inset:0;z-index:4;pointer-events:none;background-image:radial-gradient(circle,var(--deep) 1.8px,transparent 3px);background-size:17px 17px;opacity:.20;mask-image:linear-gradient(to right,black 0%,transparent 38%);-webkit-mask-image:linear-gradient(to right,black 0%,transparent 38%)}.logo{position:absolute;top:56px;right:62px;z-index:20;filter:drop-shadow(0 7px 15px rgba(0,0,0,.9))}.logo img{height:64px;max-width:300px}.laSolo{position:absolute;left:-230px;bottom:155px;width:560px;height:560px;z-index:6;opacity:.13;pointer-events:none;transform:rotate(-13deg);filter:drop-shadow(0 10px 24px rgba(0,0,0,.25))}.laSolo img{width:100%;height:100%;object-fit:contain}.copy{position:absolute;right:54px;top:172px;width:570px;z-index:10;text-align:right}.kicker{display:inline-flex;align-items:center;gap:14px;font-size:20px;font-weight:900;letter-spacing:3.2px;text-transform:uppercase;color:#fff;margin-bottom:24px;text-shadow:0 4px 14px rgba(0,0,0,.95)}.kicker:after{content:'';width:54px;height:6px;background:var(--pink);display:block;transform:skewX(-25deg)}h1{margin:0;font-weight:900;text-transform:uppercase;font-size:110px;line-height:.80;letter-spacing:-6.5px;text-shadow:0 8px 24px rgba(0,0,0,.92)}.pink{color:var(--pink)}.outline{color:transparent;-webkit-text-stroke:4.2px #fff;text-stroke:4.2px #fff;text-shadow:0 5px 18px rgba(0,0,0,1)}.sub{margin-top:24px;margin-left:auto;max-width:520px;font-size:33px;line-height:1.12;font-weight:700;color:#fff;text-shadow:0 6px 18px rgba(0,0,0,1),0 0 3px rgba(0,0,0,1)}.sub em{font-style:normal;color:var(--pink)}.mini{position:absolute;left:64px;bottom:190px;z-index:12;color:white;font-size:24px;font-weight:900;text-transform:uppercase;letter-spacing:2.6px;text-shadow:0 5px 15px rgba(0,0,0,.9)}.mini:before{content:'';display:block;width:64px;height:7px;background:var(--pink);transform:skewX(-25deg);margin-bottom:14px}.footer{position:absolute;bottom:50px;left:0;right:0;display:flex;flex-direction:column;align-items:center;z-index:25}.pill{display:inline-flex;align-items:center;gap:13px;background:var(--pink);color:#fff;padding:16px 34px;border-radius:999px;font-weight:900;font-size:22px;text-transform:uppercase;letter-spacing:1.4px;box-shadow:6px 7px 0 rgba(0,0,0,.75)}.ig{width:25px;height:25px;border:2px solid #fff;border-radius:6px;position:relative}.ig:after{content:'';position:absolute;top:50%;left:50%;width:8px;height:8px;border:2px solid #fff;border-radius:50%;transform:translate(-50%,-50%)}.stripes{display:flex;gap:8px;margin-top:12px}.stripes i{display:block;width:36px;height:7px;background:#fff;transform:skewX(-25deg)}
</style></head><body><section class="post"><div class="photo"><img src="assets/photo.jpg"></div><div class="shade"></div><div class="stageGlow"></div><div class="subjectLight"></div><div class="halftone"></div><div class="halftone2"></div><div class="laSolo"><img src="assets/la-solo.svg"></div><div class="logo"><img src="assets/logo.svg"></div><div class="copy"><div class="kicker">bateria • palco • presença</div><h1>A BATIDA<br><span class="outline">QUE FAZ</span><br>O CHÃO<br><span class="pink">TREMER</span></h1><div class="sub">Não é só tocar certo.<br>É tocar com <em>alma</em>.</div></div><div class="mini">alunos em show</div><div class="footer"><div class="pill"><span class="ig"></span>@lamusicschool</div><div class="stripes"><i></i><i></i><i></i><i></i></div></div></section></body></html>
