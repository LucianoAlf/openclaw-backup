<!DOCTYPE html><html lang='pt-BR'><head><meta charset='UTF-8'><meta name='viewport' content='width=1080,height=1350'><title>LA Music School Palhetada 02</title><style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700;800;900&display=swap');
:root{--pink:#E91E63;--pink-dark:#C2185B;--pink-light:#F06292;--black:#0A0A0A;--black-card:#141414;--cream:#F5F1EC;--cream-dark:#EDE8E1;--white:#fff;--gray:#9E9E9E;--font-display:'Bebas Neue','Impact',sans-serif;--font-body:'Montserrat','Helvetica Neue',sans-serif;}
*{box-sizing:border-box} html,body{margin:0;width:1080px;height:1350px;overflow:hidden;font-family:var(--font-body);} body{background:var(--black)}
.slide{width:1080px;height:1350px;position:relative;overflow:hidden;padding:72px 70px;display:flex;flex-direction:column;justify-content:center;}
.slide.dark{background:var(--black);color:var(--white)} .slide.cream{background:var(--cream);color:#111} .slide.pink{background:var(--pink);color:var(--white)}
.photo-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:contrast(1.05) saturate(.95);transform:scale(1.02)}
.dark .photo-bg:after,.photo .photo-bg:after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(10,10,10,.97) 0%,rgba(10,10,10,.85) 38%,rgba(10,10,10,.18) 100%),linear-gradient(0deg,rgba(10,10,10,.9) 0%,rgba(10,10,10,0) 45%)}
.diagonal{position:absolute;right:-170px;top:-80px;width:430px;height:1550px;background:var(--pink);transform:skewX(-8deg);opacity:.94;z-index:1}.cream .diagonal{opacity:.12}.pink .diagonal{background:#0A0A0A;opacity:.16}
.dots{position:absolute;inset:auto 70px 160px auto;width:220px;height:220px;opacity:.20;background-image:radial-gradient(currentColor 2px, transparent 2px);background-size:22px 22px;color:var(--pink);z-index:2}.cream .dots{opacity:.23}.pink .dots{color:#fff;opacity:.20}
.ring{position:absolute;right:96px;top:126px;width:190px;height:190px;border:2px solid rgba(255,255,255,.18);border-radius:50%;z-index:2}.cream .ring{border-color:rgba(233,30,99,.20)}.pink .ring{border-color:rgba(255,255,255,.25)}
.content{position:relative;z-index:5;max-width:780px}.photo .content{max-width:640px}.tag{display:flex;align-items:center;gap:16px;font-size:20px;letter-spacing:5px;font-weight:800;color:var(--pink);text-transform:uppercase;margin-bottom:26px}.tag:before{content:'';width:52px;height:4px;background:currentColor}.pink .tag{color:#fff}.dark .tag{color:var(--pink)}
h1{font-family:var(--font-display);font-size:118px;line-height:.88;letter-spacing:.5px;text-transform:uppercase;margin:0 0 28px}h1 span{color:var(--pink)}.pink h1 span{color:#0A0A0A}.cream h1{font-size:104px}.pink h1{font-size:98px}.photo h1{font-size:128px;max-width:650px}
.body{font-size:35px;line-height:1.25;font-weight:500;max-width:760px;margin:0;color:inherit}.dark .body{color:#EDEDED}.cream .body{color:#1A1A1A}.pink .body{font-weight:600}.kicker{font-size:34px;line-height:1.25;color:#E7E7E7;max-width:590px;margin:0 0 46px;font-weight:500}.call{margin-top:46px;display:inline-flex;align-items:center;background:var(--pink);color:#fff;padding:20px 26px;font-size:23px;font-weight:900;letter-spacing:1.6px;text-transform:uppercase}.cream .call{background:#0A0A0A}.pink .call{background:#0A0A0A;color:#fff}.button{margin-top:44px;background:#fff;color:#0A0A0A;display:inline-flex;padding:23px 32px;border-radius:999px;font-weight:900;font-size:25px;letter-spacing:.8px}.note{font-size:25px;font-weight:800;color:#fff;background:var(--pink);display:inline-flex;padding:16px 22px;align-self:flex-start;letter-spacing:1px}
.big-number{position:absolute;left:56px;top:40px;font-family:var(--font-display);font-size:260px;line-height:1;color:rgba(233,30,99,.08);z-index:0}.dark .big-number{color:rgba(255,255,255,.06)}.pink .big-number{color:rgba(0,0,0,.13)}
.footer{position:absolute;left:70px;right:70px;bottom:54px;z-index:6;display:flex;justify-content:space-between;align-items:center;font-size:18px;font-weight:800;letter-spacing:2px;text-transform:uppercase}.logo{display:flex;gap:14px;align-items:center}.mark{width:42px;height:42px;border:3px solid currentColor;border-radius:50%;display:grid;place-items:center}.mark:after{content:'';width:11px;height:11px;background:var(--pink);border-radius:50%}.pink .mark:after{background:#0A0A0A}.page{opacity:.7}.cream .footer{color:#111}.dark .footer,.photo .footer{color:#fff}.pink .footer{color:#fff}
.rule{position:absolute;left:70px;top:70px;right:70px;height:1px;background:currentColor;opacity:.12;z-index:6}.cream .rule{color:#000}.dark .rule{color:#fff}.pink .rule{color:#fff}
</style></head><body>
<div class='slide cream'>

<div class='rule'></div><div class='big-number'>02</div><div class='diagonal'></div><div class='ring'></div><div class='dots'></div>
<div class='content'>
  <div class='tag'>DICA 01</div>
  <h1>RELAXA A <span>MÃO</span></h1>
  <p class='body'>Se a mão direita trava, a palheta vira freio. Segura firme o bastante pra não cair. Leve o bastante pra deslizar.</p>
  
  <div class='call'>FORÇA NÃO É CONTROLE.</div>
  
</div>
<div class='footer'><div class='logo'><div class='mark'></div><span>LA MUSIC SCHOOL</span></div><div class='page'>02 / 07 · @LAMUSICSCHOOL</div></div>
</div></body></html>
