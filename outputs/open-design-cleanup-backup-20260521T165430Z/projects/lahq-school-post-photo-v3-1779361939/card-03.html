<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LA Music School - Card 03</title>
  <link rel="stylesheet" href="carousel.css">
</head>
<body>
  <main class="artboard card-03 frame-lines">
    <div class="photo" aria-hidden="true"></div>
    <div class="overlay" aria-hidden="true"></div>
    <div class="texture" aria-hidden="true"></div>
    <div class="negative-symbol" aria-hidden="true">
      <svg viewBox="0 0 600 600" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M120 300 H480" />
        <path d="M300 120 V480" />
      </svg>
    </div>
    <div class="toplock">
      <div class="logo-band">
        <img src="assets/logos/logo-la-music-light-completa.svg" alt="LA Music School">
      </div>
    </div>
    <section class="cta-copy">
      <div class="eyebrow">Última chamada</div>
      <h2 class="title cta">Toca mais alto.</h2>
      <p class="subline">Agende sua aula experimental.</p>
      <div class="direct-band">Chame no direct @lamusicschool</div>
    </section>
    <div class="footer-note">
      <p class="micro">Campanha LA Music School</p>
      <p class="micro">Foto segura, tratamento premium, CTA limpo.</p>
    </div>
  </main>
</body>
</html>
