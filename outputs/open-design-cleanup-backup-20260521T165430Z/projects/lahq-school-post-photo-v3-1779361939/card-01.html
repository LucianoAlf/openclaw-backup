<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LA Music School - Card 01</title>
  <link rel="stylesheet" href="carousel.css">
</head>
<body>
  <main class="artboard card-01 frame-lines">
    <div class="photo" aria-hidden="true"></div>
    <div class="overlay" aria-hidden="true"></div>
    <div class="texture" aria-hidden="true"></div>
    <div class="negative-symbol" aria-hidden="true">
      <svg viewBox="0 0 600 600" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M140 140 L460 460 M460 140 L140 460" />
      </svg>
    </div>
    <div class="toplock">
      <div class="logo-band">
        <img src="assets/logos/logo-la-music-light-completa.svg" alt="LA Music School">
      </div>
    </div>
    <section class="hero-copy">
      <div class="eyebrow">Aula experimental</div>
      <h1 class="title hero">Sua guitarra merece o palco.</h1>
      <p class="subline">Uma experiência real de técnica, som e presença.</p>
      <div class="cta-prompt">Agende sua experiência</div>
    </section>
  </main>
</body>
</html>
