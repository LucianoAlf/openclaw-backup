<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LA Music School - Card 01</title>
    <link rel="stylesheet" href="carousel.css" />
  </head>
  <body>
    <main class="canvas">
      <div class="frame"></div>
      <div class="glow-ring"></div>
      <div class="beam"></div>
      <div class="pulse"></div>
      <div class="halftone"></div>

      <section class="card">
        <div class="logo">
          <img src="assets/logos/logo-la-music-light-completa.svg" alt="LA Music School" />
        </div>

        <div class="hero card-hero">
          <div class="eyebrow">Matrículas abertas</div>
          <h1 class="title">
            <span class="outline">Seu som</span><br />
            <span class="pink">merece palco.</span>
          </h1>
          <p class="deck">
            Aula experimental de guitarra para jovens e adultos que querem sair do ensaio e entrar na cena.
          </p>
          <div class="micro">
            <span>Guitarra</span>
            <span>Palco</span>
            <span>Técnica</span>
            <span>Identidade</span>
          </div>
        </div>

        <div class="footer-note">
          <div class="meta">Campanha de captação • LA Music School</div>
          <div class="badge">Passe pro lado</div>
        </div>
      </section>
    </main>
  </body>
  </html>
