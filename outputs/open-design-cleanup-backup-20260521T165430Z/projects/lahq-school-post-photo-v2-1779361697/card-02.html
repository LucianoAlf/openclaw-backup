<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LA Music School - Card 02</title>
    <link rel="stylesheet" href="carousel.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="card card-2" aria-label="Card 2">
        <div class="card-inner">
          <div class="logo-wrap">
            <img src="assets/logos/logo-la-music-light-completa.svg" alt="LA Music School" />
          </div>

          <div class="hero">
            <img src="assets/photos/guitarrista-palco.jpg" alt="Guitarrista no palco sob luz dramática" />
            <div class="tone"></div>
            <div class="glow"></div>
            <div class="stage-sparks"></div>
          </div>

          <div class="copy-block">
            <div class="eyebrow">O que muda quando a aula é certa</div>
            <h1 class="headline">A TÉCNICA É SÓ O COMEÇO.</h1>
            <div class="motifs">
              <div class="motif">
                <strong>correção real</strong>
                <span>Postura, ritmo e execução ajustados no detalhe.</span>
              </div>
              <div class="motif">
                <strong>som limpo</strong>
                <span>Menos ruído, mais clareza e intenção na guitarra.</span>
              </div>
              <div class="motif">
                <strong>presença</strong>
                <span>Confiança para tocar com atitude diante do palco.</span>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
