<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LA Music School - Card 03</title>
    <link rel="stylesheet" href="carousel.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="card card-3" aria-label="Card 3">
        <div class="card-inner">
          <div class="logo-wrap">
            <img src="assets/logos/logo-la-music-light-completa.svg" alt="LA Music School" />
          </div>

          <div class="hero">
            <img src="assets/photos/guitarrista-palco.jpg" alt="Guitarrista no palco sob luz dramática" />
            <div class="tone"></div>
            <div class="glow"></div>
            <div class="stage-sparks"></div>
          </div>

          <div class="copy-block">
            <div class="eyebrow">Seu próximo passo começa agora</div>
            <h1 class="headline"><span class="outline">TOCA</span> MAIS ALTO.</h1>
            <p class="subhead">Agende sua aula experimental e descubra o que a sua guitarra pode entregar.</p>
            <div class="cta-row">
              <a class="cta" href="#">Agende sua aula experimental</a>
              <a class="cta secondary" href="#">WhatsApp / @lamusicschool</a>
            </div>
            <div class="footer-note">
              <span class="contact-line"><span class="slash">/</span> @lamusicschool</span>
              <span class="social">WhatsApp placeholder</span>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
