<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LA Music School - Card 01</title>
    <link rel="stylesheet" href="carousel.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="card card-1" aria-label="Card 1">
        <div class="card-inner">
          <div class="logo-wrap">
            <img src="assets/logos/logo-la-music-light-completa.svg" alt="LA Music School" />
          </div>

          <div class="hero">
            <img src="assets/photos/guitarrista-palco.jpg" alt="Guitarrista no palco sob luz dramática" />
            <div class="tone"></div>
            <div class="glow"></div>
            <div class="stage-sparks"></div>
          </div>

          <div class="copy-block">
            <div class="eyebrow">Aula experimental de guitarra</div>
            <h1 class="headline">SEU SOM MERECE PALCO.</h1>
            <p class="subhead">Técnica, presença e som limpo com energia de show.</p>
            <div class="cta-row">
              <a class="cta" href="#">Agende sua experiência</a>
              <span class="accent-line" aria-hidden="true"></span>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
