<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><title>Aulas em Grupo 02</title><style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka:wght@500;600;700&display=swap');
:root{--ink:#20242A;--cream:#FFF7E8;--yellow:#FFD84D;--blue:#37B6FF;--green:#20C997;--coral:#FF6B6B;--purple:#7C5CFF;--white:#fff;--font:'Nunito',sans-serif;--display:'Fredoka',sans-serif}*{box-sizing:border-box}body{margin:0;width:1080px;height:1350px;overflow:hidden;background:#f9f2df;font-family:var(--font);color:var(--ink)}.slide{position:relative;width:1080px;height:1350px;overflow:hidden;padding:72px 66px 88px;display:flex;flex-direction:column;justify-content:center}.cream{background:linear-gradient(135deg,#FFF7E8,#FFEFC9)}.green{background:linear-gradient(135deg,#E9FFF6,#BFF4DF)}.blue{background:linear-gradient(135deg,#E8F7FF,#BFEAFF)}.photo{background:#111;color:white}.bg{position:absolute;inset:0;background-size:cover;background-position:center;transform:scale(1.025);filter:saturate(.98) contrast(1.04)}.bg:after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.05),rgba(0,0,0,.20) 35%,rgba(0,0,0,.78) 82%,rgba(0,0,0,.88)),linear-gradient(90deg,rgba(0,0,0,.55),rgba(0,0,0,.06) 56%,rgba(55,182,255,.18))}.cover .bg:after{background:linear-gradient(180deg,rgba(0,0,0,.00),rgba(0,0,0,.18) 32%,rgba(0,0,0,.82) 80%,#111)}.blob{position:absolute;border-radius:999px;z-index:1}.b1{width:420px;height:420px;background:var(--yellow);left:-120px;top:-100px;opacity:.75}.b2{width:360px;height:360px;background:var(--coral);right:-90px;bottom:70px;opacity:.55}.b3{width:240px;height:240px;background:var(--blue);right:85px;top:170px;opacity:.40}.photo .blob{mix-blend-mode:screen;opacity:.30}.dots{position:absolute;z-index:2;inset:0;opacity:.22;background-image:radial-gradient(circle,rgba(32,36,42,.7) 2px,transparent 3px);background-size:24px 24px;mask-image:radial-gradient(circle at 12% 18%,black 0,transparent 34%),radial-gradient(circle at 92% 78%,black 0,transparent 38%)}.photo .dots{background-image:radial-gradient(circle,rgba(255,255,255,.75) 2px,transparent 3px);opacity:.15}.music{position:absolute;z-index:3;font-family:var(--display);font-weight:700;font-size:62px;color:rgba(32,36,42,.18)}.photo .music{color:rgba(255,255,255,.18)}.m1{left:82px;top:190px;transform:rotate(-10deg)}.m2{right:96px;bottom:220px;transform:rotate(12deg)}.brand{position:absolute;z-index:20;top:52px;left:66px;font-family:var(--display);font-size:30px;font-weight:700;letter-spacing:.4px;color:var(--ink);display:flex;align-items:center;gap:12px}.brand-dot{width:20px;height:20px;background:linear-gradient(135deg,var(--coral),var(--yellow),var(--green),var(--blue));border-radius:50%}.photo .brand{color:#fff}.num{position:absolute;z-index:20;top:58px;right:62px;font-size:22px;font-weight:900;opacity:.62}.content{position:relative;z-index:10;max-width:900px;margin-top:52px}.tag{display:inline-flex;background:var(--ink);color:#fff;border-radius:999px;padding:13px 23px;font-size:18px;font-weight:900;letter-spacing:1.3px;text-transform:uppercase;margin-bottom:26px;box-shadow:7px 7px 0 rgba(0,0,0,.12)}.photo .tag{background:#fff;color:var(--ink)}.green .tag{background:#087D5D}.blue .tag{background:#026AA2}h1{font-family:var(--display);font-size:86px;line-height:.94;letter-spacing:-2px;margin:0;max-width:900px;color:var(--ink)}.cover h1{font-size:94px;color:#fff;text-shadow:0 8px 28px rgba(0,0,0,.35)}.photo h1{color:#fff;text-shadow:0 8px 24px rgba(0,0,0,.3)}p{font-size:34px;line-height:1.16;font-weight:700;max-width:805px;margin:32px 0 0;color:rgba(32,36,42,.86)}.photo p{color:rgba(255,255,255,.90)}.note{display:inline-flex;margin-top:34px;border-radius:999px;background:#fff;color:var(--ink);padding:18px 27px;font-size:24px;font-weight:900;box-shadow:8px 8px 0 rgba(0,0,0,.16);text-transform:uppercase}.cream .note{background:var(--yellow)}.green .note{background:#fff}.blue .note{background:var(--ink);color:#fff}.footer{position:absolute;z-index:20;left:66px;right:66px;bottom:36px;height:34px;display:flex;align-items:center;justify-content:space-between;font-size:18px;font-weight:900;opacity:.75}.line{height:8px;width:250px;border-radius:999px;background:linear-gradient(90deg,var(--coral),var(--yellow),var(--green),var(--blue))}.photo .footer{color:#fff;opacity:.78}.cta h1{font-size:78px}.cta .note{font-size:25px;padding:20px 30px}
</style></head><body><section class="slide cream"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div><div class="dots"></div><div class="music m1">♪</div><div class="music m2">♫</div><div class="brand"><span class="brand-dot"></span> música em grupo</div><div class="num">02/08</div><main class="content"><div class="tag">01</div><h1>Aprender junto muda tudo</h1><p>Na turma, a criança percebe que música não é só acertar nota. É ouvir, esperar, entrar na hora certa e fazer parte.</p><div class="note">AULA VIRA EXPERIÊNCIA</div></main><div class="footer"><span>aprender junto · tocar junto · crescer junto</span><span class="line"></span></div></section></body></html>
