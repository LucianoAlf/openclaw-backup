<!doctype html><html><head><meta charset="utf-8"><style>
@font-face{font-family:Prompt;src:url('assets/font-black.ttf') format('truetype');font-weight:900}
@font-face{font-family:Prompt;src:url('assets/font-bold.ttf') format('truetype');font-weight:700}
@font-face{font-family:Prompt;src:url('assets/font-regular.ttf') format('truetype');font-weight:400}
:root{--pink:#E91451;--deep:#740A28;--black:#0A0A0A;--white:#fff;--gray:#E8E8E8}
*{box-sizing:border-box}body{margin:0;background:#111;font-family:Prompt,Arial,sans-serif}.post{width:1080px;height:1350px;position:relative;overflow:hidden;background:#0A0A0A;color:#fff}.photo{position:absolute;inset:0;z-index:1}.photo img{width:100%;height:100%;object-fit:cover;object-position:45% center;filter:contrast(1.08) saturate(1.12)}.shade{position:absolute;inset:0;z-index:2;background:linear-gradient(90deg,rgba(0,0,0,.10) 0%,rgba(0,0,0,.28) 38%,rgba(0,0,0,.82) 100%),linear-gradient(180deg,rgba(0,0,0,.55) 0%,rgba(0,0,0,.08) 28%,rgba(0,0,0,.92) 100%)}.pinkGlow{position:absolute;inset:0;z-index:3;background:radial-gradient(ellipse at 80% 30%,rgba(233,20,81,.48),transparent 36%),radial-gradient(ellipse at 18% 72%,rgba(233,20,81,.20),transparent 30%);mix-blend-mode:screen;opacity:.62}.subjectLight{position:absolute;inset:0;z-index:3;background:radial-gradient(ellipse at 35% 40%,rgba(255,220,230,.16),transparent 25%);mix-blend-mode:screen;pointer-events:none}.halftone{position:absolute;inset:0;z-index:4;pointer-events:none;background-image:radial-gradient(circle,var(--pink) 2.15px,transparent 3.3px);background-size:18px 18px;opacity:.34;mix-blend-mode:screen;mask-image:linear-gradient(to left,black 0%,black 22%,transparent 55%);-webkit-mask-image:linear-gradient(to left,black 0%,black 22%,transparent 55%)}.halftone2{position:absolute;inset:0;z-index:4;pointer-events:none;background-image:radial-gradient(circle,var(--deep) 1.8px,transparent 3px);background-size:17px 17px;opacity:.25;mask-image:radial-gradient(ellipse at bottom left,black 0%,transparent 45%);-webkit-mask-image:radial-gradient(ellipse at bottom left,black 0%,transparent 45%)}.logo{position:absolute;top:46px;right:56px;z-index:20;filter:drop-shadow(0 7px 15px rgba(0,0,0,.85))}.logo img{height:68px;max-width:320px}.copy{position:absolute;right:62px;top:214px;width:470px;z-index:10;text-align:right}.kicker{display:inline-flex;align-items:center;gap:14px;font-size:22px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:#fff;margin-bottom:22px;text-shadow:0 4px 14px rgba(0,0,0,.9)}.kicker:after{content:'';width:54px;height:6px;background:var(--pink);display:block;transform:skewX(-25deg)}h1{margin:0;font-weight:900;text-transform:uppercase;font-size:84px;line-height:.84;letter-spacing:-4.5px;text-shadow:0 7px 22px rgba(0,0,0,.88)}.pink{color:var(--pink)}.outline{color:transparent;-webkit-text-stroke:3.4px #fff;text-stroke:3.4px #fff;text-shadow:0 5px 18px rgba(0,0,0,.95)}.sub{margin-top:24px;margin-left:auto;max-width:440px;font-size:29px;line-height:1.15;font-weight:700;color:#fff;text-shadow:0 5px 16px rgba(0,0,0,.95);background:rgba(0,0,0,.22);border-left:4px solid var(--pink);padding:12px 17px 14px;border-radius:14px;backdrop-filter:blur(1px)}.tag{display:inline-block;margin-top:24px;background:var(--pink);color:#fff;border-radius:999px;padding:12px 24px;font-size:18px;font-weight:900;text-transform:uppercase;letter-spacing:1.4px;box-shadow:6px 7px 0 rgba(0,0,0,.78)}.footer{position:absolute;bottom:46px;left:0;right:0;display:flex;flex-direction:column;align-items:center;z-index:25}.pill{display:inline-flex;align-items:center;gap:13px;background:var(--pink);color:#fff;padding:14px 31px;border-radius:999px;font-weight:900;font-size:19px;text-transform:uppercase;letter-spacing:1.4px;box-shadow:6px 7px 0 rgba(0,0,0,.75)}.ig{width:23px;height:23px;border:2px solid #fff;border-radius:6px;position:relative}.ig:after{content:'';position:absolute;top:50%;left:50%;width:8px;height:8px;border:2px solid #fff;border-radius:50%;transform:translate(-50%,-50%)}.stripes{display:flex;gap:8px;margin-top:14px}.stripes i{display:block;width:36px;height:7px;background:#fff;transform:skewX(-25deg)}.chev{position:absolute;right:68px;bottom:148px;z-index:12;color:var(--pink);font-size:66px;font-weight:900;letter-spacing:-8px;text-shadow:0 6px 14px rgba(0,0,0,.8)}.pluses{position:absolute;left:58px;bottom:136px;z-index:12;display:grid;grid-template-columns:repeat(3,1fr);gap:8px 15px;color:rgba(233,20,81,.82);font-size:38px;font-weight:900;text-shadow:0 5px 14px rgba(0,0,0,.7)}
</style></head><body><section class="post"><div class="photo"><img src="assets/photo.jpg"></div><div class="shade"></div><div class="pinkGlow"></div><div class="subjectLight"></div><div class="halftone"></div><div class="halftone2"></div><div class="logo"><img src="assets/logo.svg"></div><div class="copy"><div class="kicker">aluno no palco</div><h1>O PALCO<br><span class="outline">COMEÇA</span><br><span class="pink">AQUI</span></h1><div class="sub">Cada acorde carrega alma.<br>Cada aluno tem um som pra mostrar.</div></div><div class="chev">» » »</div><div class="footer"><div class="pill"><span class="ig"></span>@lamusicschool</div><div class="stripes"><i></i><i></i><i></i><i></i></div></div></section></body></html>
